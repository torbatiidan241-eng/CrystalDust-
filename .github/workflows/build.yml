name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y build-essential libpng-dev

      - name: Build ROM
        run: |
          # Step 1: Create the 'songs.mk' file before the system looks for it
          mkdir -p sound
          touch sound/songs.mk
          
          # Step 2: Build the specialized encoders
          make -C tools clean
          make -C tools -j$(nproc)
          
          # Step 3: Compile the actual game
          make -j$(nproc)

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: CrystalDust-Build
          path: |
            *.gba
            *.gbc
