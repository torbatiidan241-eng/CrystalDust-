name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y build-essential libpng-dev

      - name: Build ROM
        run: |
          # Manually create the files the Makefile is crying about
          mkdir -p sound
          touch sound/songs.mk
          mkdir -p tools/sound
          touch tools/songs.mk
          
          # Build the tools individually
          make -C tools
          
          # Build the main ROM
          make
