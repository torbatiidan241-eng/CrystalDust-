name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libpng-dev git curl
          # Install poryscript (dialogue tool)
          curl -L https://github.com/huderlem/poryscript/releases/latest/download/poryscript-linux -o /usr/bin/poryscript
          chmod +x /usr/bin/poryscript

      - name: Build ROM
        run: |
          # Fix for the 'multiple definition of gFlash' error
          export CFLAGS="-fcommon"
          
          # Manually create files that the Makefile fails to generate automatically
          mkdir -p sound
          touch sound/songs.mk
          
          # Force build all tools before starting the ROM
          make -C tools
          make -j$(nproc)

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: CrystalDust-Build
          path: |
            *.gba
            *.gbc
