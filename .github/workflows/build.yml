name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libpng-dev git curl
          # Manually install poryscript to avoid the 'tools' compilation error
          curl -L https://github.com/huderlem/poryscript/releases/latest/download/poryscript-linux -o /usr/bin/poryscript
          chmod +x /usr/bin/poryscript

      - name: Build ROM
        run: |
          # Create the dummy files the Makefile is looking for to prevent 'No rule to make target'
          mkdir -p sound
          touch sound/songs.mk
          
          # Fix for the 'multiple definition of gFlash' error seen in previous runs
          export CFLAGS="-fcommon"
          
          # Skip 'make -C tools' and build the ROM directly
          # The system will use the poryscript we installed above
          make -j$(nproc)

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: CrystalDust-Build
          path: |
            *.gba
            *.gbc
